services:
  tides:
    image: nginx:alpine
    container_name: tides-dashboard
    restart: unless-stopped
    ports:
      - "5003:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./config.js:/usr/share/nginx/html/config.js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro